baseURL: https://reeceholland.github.io/
languageCode: en-us
title: Reece Holland
theme: PaperMod

pagination.pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
minify:
  disableXML: true
  minifyOutput: true

menu:
  main:

    - identifier: about
      name: About
      url: /about/
      weight: 1

    - identifier: projects
      name: Projects
      url: /projects/
      weight: 2

    - identifier: blog
      name: Blog
      url: /posts/
      weight: 3



params:

  defaultTheme: auto

  homeInfoParams:
    Title: "Hi, I'm Reece 👋"
    Content: "Welcome to my blog."
  profileMode:
    enabled: true
    title: "Reece Holland"
    subtitle: "Building ROS 2 robots, embedded firmware, and autonomy systems"
    imageUrl: "/images/work_photo.png"     # relative to /static
    imageTitle: "Banner Image"
    imageWidth: 300                    # optional
    imageHeight: 300  